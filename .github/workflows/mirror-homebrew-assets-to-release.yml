name: Mirror Homebrew Assets To Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to mirror assets into (example: v0.1.0-rc8)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download selected assets from homebrew-tap release
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/mirror-assets
          api_url="https://api.github.com/repos/gautampachnanda101/homebrew-tap/releases/tags/${TAG}"
          curl -fsSL "$api_url" > .tmp/homebrew-release.json

          mapfile -t urls < <(jq -r '.assets[].browser_download_url' .tmp/homebrew-release.json | grep -E '(promptx_.*_Windows_x86_64\.zip|vaultx_.*_Windows_x86_64\.zip)$' || true)

          if [[ ${#urls[@]} -eq 0 ]]; then
            echo "No promptx/vaultx zip assets found in homebrew-tap release ${TAG}."
            exit 0
          fi

          for url in "${urls[@]}"; do
            file_name="$(basename "$url")"
            curl -fL "$url" -o ".tmp/mirror-assets/${file_name}"
            echo "Downloaded ${file_name}"
          done

      - name: Upload mirrored assets to this repo release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(.tmp/mirror-assets/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No files to upload."
            exit 0
          fi

          gh release upload "$TAG" "${files[@]}" --repo "${{ github.repository }}" --clobber
