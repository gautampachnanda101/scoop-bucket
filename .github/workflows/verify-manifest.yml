name: Verify Scoop Manifest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-installation:
    name: Verify Scoop Package Install
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Scoop
        run: |
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          echo "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Determine manifests to verify
        id: manifests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Get-ManifestCandidates {
            $workspace = $env:GITHUB_WORKSPACE
            $jsonFiles = Get-ChildItem -Path $workspace -File -Filter '*.json' -Recurse -ErrorAction SilentlyContinue |
              Where-Object {
                $rel = $_.FullName.Substring($workspace.Length + 1).Replace('\\', '/')
                $rel -notmatch '^\.github/' -and $rel -notmatch '^docs/' -and $rel -notmatch '^tests/' -and $rel -notmatch '^\.git/'
              }

            $valid = @()
            foreach ($file in $jsonFiles) {
              try {
                $manifest = Get-Content -Path $file.FullName -Raw | ConvertFrom-Json -ErrorAction Stop
              } catch {
                continue
              }

              # Treat as Scoop manifest only if it has a version and a download definition.
              if ($manifest.PSObject.Properties.Name -contains 'version' -and (
                  $manifest.PSObject.Properties.Name -contains 'url' -or
                  $manifest.PSObject.Properties.Name -contains 'architecture')) {
                $valid += $file
              }
            }

            return $valid | Sort-Object -Property FullName -Unique
          }

          $eventName = '${{ github.event_name }}'
          $selected = @()

          if ($eventName -eq 'workflow_dispatch') {
            $selected = Get-ManifestCandidates
          } else {
            if ($eventName -eq 'pull_request') {
              $base = '${{ github.event.pull_request.base.sha }}'
              $head = '${{ github.event.pull_request.head.sha }}'
            } else {
              $base = '${{ github.event.before }}'
              $head = '${{ github.sha }}'
            }

            if ([string]::IsNullOrWhiteSpace($base) -or $base -eq '0000000000000000000000000000000000000000') {
              $selected = Get-ManifestCandidates
            } else {
              $changed = git diff --name-only "$base" "$head"
              $changedSet = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
              foreach ($f in $changed) {
                if ([string]::IsNullOrWhiteSpace($f)) { continue }
                if ($f -match '^tests/' -or $f -match '^\.github/' -or $f -match '^docs/') { continue }
                if ($f -match '\.json$') {
                  [void]$changedSet.Add($f)
                }
              }

              foreach ($candidate in Get-ManifestCandidates) {
                $rel = $candidate.FullName.Substring($env:GITHUB_WORKSPACE.Length + 1).Replace('\\', '/')
                if ($changedSet.Contains($rel)) {
                  $selected += $candidate
                }
              }
            }
          }

          $selected = $selected | Sort-Object -Property FullName -Unique
          if (-not $selected -or $selected.Count -eq 0) {
            Write-Host 'No changed manifests detected. Skipping package verification.'
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "packages=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $stagingRoot = Join-Path $env:RUNNER_TEMP 'ci-scoop-bucket'
          $bucketDir = Join-Path $stagingRoot 'bucket'
          if (Test-Path $stagingRoot) {
            Remove-Item -Path $stagingRoot -Recurse -Force
          }
          New-Item -Path $bucketDir -ItemType Directory -Force | Out-Null

          $packages = @()
          foreach ($manifest in $selected) {
            $filename = [System.IO.Path]::GetFileName($manifest.FullName)
            Copy-Item -Path $manifest.FullName -Destination (Join-Path $bucketDir $filename)
            $packages += [System.IO.Path]::GetFileNameWithoutExtension($filename)
          }

          $packages = $packages | Sort-Object -Unique
          Write-Host "Selected manifests: $($packages -join ', ')"

          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bucket_manifest_dir=$bucketDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "packages=$($packages -join ' ')" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install manifests directly from local files
        if: steps.manifests.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $manifestDir = '${{ steps.manifests.outputs.bucket_manifest_dir }}'
          $packages = '${{ steps.manifests.outputs.packages }}'.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)

          foreach ($pkg in $packages) {
            Write-Host "Installing $pkg"
            $manifestFile = Join-Path $manifestDir "$pkg.json"
            if (-not (Test-Path $manifestFile)) {
              throw "Manifest file not found: $manifestFile"
            }

            scoop install $manifestFile
          }

      - name: Verify installed packages
        if: steps.manifests.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $manifestDir = '${{ steps.manifests.outputs.bucket_manifest_dir }}'
          $packages = '${{ steps.manifests.outputs.packages }}'.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)

          function Get-BinCommandsFromManifest {
            param(
              [Parameter(Mandatory = $true)]
              [string]$ManifestFile
            )

            $manifest = Get-Content -Path $ManifestFile -Raw | ConvertFrom-Json -ErrorAction Stop
            $commands = @()

            function Add-CommandName {
              param([string]$Name)
              if ([string]::IsNullOrWhiteSpace($Name)) { return }
              $trimmed = $Name.Trim()
              if ([string]::IsNullOrWhiteSpace($trimmed)) { return }

              $leaf = Split-Path -Path $trimmed -Leaf
              $stem = [System.IO.Path]::GetFileNameWithoutExtension($leaf)
              if (-not [string]::IsNullOrWhiteSpace($stem)) {
                $script:commands += $stem
              }
            }

            function Add-BinEntry {
              param($Entry)
              if ($null -eq $Entry) { return }

              if ($Entry -is [string]) {
                Add-CommandName -Name $Entry
                return
              }

              if ($Entry -is [System.Array]) {
                if ($Entry.Count -ge 2 -and -not [string]::IsNullOrWhiteSpace([string]$Entry[1])) {
                  Add-CommandName -Name ([string]$Entry[1])
                } elseif ($Entry.Count -ge 1) {
                  Add-CommandName -Name ([string]$Entry[0])
                }
              }
            }

            if ($manifest.PSObject.Properties.Name -contains 'bin') {
              $bin = $manifest.bin
              if ($bin -is [System.Array]) {
                foreach ($entry in $bin) {
                  Add-BinEntry -Entry $entry
                }
              } else {
                Add-BinEntry -Entry $bin
              }
            }

            if ($manifest.PSObject.Properties.Name -contains 'architecture') {
              $arch = $manifest.architecture
              if ($arch.PSObject.Properties.Name -contains '64bit') {
                $a64 = $arch.'64bit'
                if ($a64.PSObject.Properties.Name -contains 'bin') {
                  $bin64 = $a64.bin
                  if ($bin64 -is [System.Array]) {
                    foreach ($entry in $bin64) {
                      Add-BinEntry -Entry $entry
                    }
                  } else {
                    Add-BinEntry -Entry $bin64
                  }
                }
              }
            }

            return $commands | Sort-Object -Unique
          }

          function Invoke-SmokeCheck {
            param(
              [Parameter(Mandatory = $true)]
              [string]$CommandName
            )

            $argsMatrix = @(
              @('--version'),
              @('version'),
              @('-V'),
              @('--help')
            )

            foreach ($argSet in $argsMatrix) {
              try {
                & $CommandName @argSet *> $null
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "Smoke check passed: $CommandName $($argSet -join ' ')"
                  return $true
                }
              } catch {
              }
            }

            return $false
          }

          foreach ($pkg in $packages) {
            Write-Host "Verifying $pkg"
            scoop list $pkg

            $manifestFile = Join-Path $manifestDir "$pkg.json"
            if (-not (Test-Path $manifestFile)) {
              throw "Manifest file not found during verify: $manifestFile"
            }

            $commands = Get-BinCommandsFromManifest -ManifestFile $manifestFile
            if (-not $commands -or $commands.Count -eq 0) {
              throw "No bin commands found in manifest: $manifestFile"
            }

            foreach ($cmd in $commands) {
              $resolved = Get-Command $cmd -ErrorAction SilentlyContinue
              if (-not $resolved) {
                throw "Expected command '$cmd' was not found on PATH after installing '$pkg'."
              }

              if (-not (Invoke-SmokeCheck -CommandName $cmd)) {
                throw "Command '$cmd' installed but failed smoke checks (--version/version/-V/--help)."
              }
            }
          }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $packagesRaw = '${{ steps.manifests.outputs.packages }}'
          if (-not [string]::IsNullOrWhiteSpace($packagesRaw)) {
            $packages = $packagesRaw.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)
            foreach ($pkg in $packages) {
              scoop uninstall $pkg *> $null
            }
          }
